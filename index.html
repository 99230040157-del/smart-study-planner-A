<!DOCTYPE html>
<html>
<head>
<title>Smart Study Planner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(120deg,#667eea,#764ba2);
color:white;
overflow-x:hidden;
}

/* Floating icons */

.edu3d{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.obj{
position:absolute;
font-size:60px;
opacity:0.2;
animation:float 20s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-100vh)}
}

.obj1{left:10%}
.obj2{left:25%}
.obj3{left:40%}
.obj4{left:60%}
.obj5{left:75%}
.obj6{left:90%}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
margin:20px 0;
border-radius:10px;
}

input,select,button{
padding:10px;
margin:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#667eea;
color:white;
border:none;
cursor:pointer;
}

.logout{
background:#e74c3c;
float:right;
}

.task{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #eee;
}

.completed{
text-decoration:line-through;
color:gray;
}

.stats{
display:flex;
gap:20px;
font-weight:bold;
}

.timeBox{
font-weight:bold;
color:#444;
}

#dashboard{
display:none;
}

</style>
</head>

<body>

<div class="edu3d">
<div class="obj obj1">📚</div>
<div class="obj obj2">🎓</div>
<div class="obj obj3">💻</div>
<div class="obj obj4">✏️</div>
<div class="obj obj5">📖</div>
<div class="obj obj6">🌍</div>
</div>

<div class="container">

<h1>Smart Study Planner</h1>

<div class="card" id="loginPage">

<h2>Login</h2>

<input id="loginUser" placeholder="Username">
<input type="password" id="loginPass" placeholder="Password">

<br>

<button onclick="login()">Login</button>

<h3>Create Account</h3>

<input id="regUser" placeholder="Username">
<input type="password" id="regPass" placeholder="Password">

<br>

<button onclick="register()">Register</button>

</div>

<div id="dashboard">

<div class="card">

<h2>Dashboard</h2>

<button class="logout" onclick="logout()">Logout</button>

<div class="stats">
<span>Total: <span id="total">0</span></span>
<span>Completed: <span id="done">0</span></span>
<span>Pending: <span id="pending">0</span></span>
</div>

</div>

<div class="card">

<h2>Add Study Task</h2>

<input id="taskInput" placeholder="Task Name">

<select id="priority">
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>

<button onclick="addTask()">Add Task</button>

</div>

<div class="card">

<h2>Tasks</h2>

<div id="taskList"></div>

</div>

<div class="card">

<h2>📊 Study Analytics</h2>

<p>Study time per task</p>
<canvas id="timeChart"></canvas>

<p>Completed vs Pending</p>
<canvas id="completionChart"></canvas>

</div>

</div>

</div>

<script>

let tasks=[]
let timeChart
let completionChart

function register(){

let user=document.getElementById("regUser").value
let pass=document.getElementById("regPass").value

if(user==""||pass==""){
alert("Enter username and password")
return
}

localStorage.setItem(user,pass)
alert("Account created")

}

function login(){

let user=document.getElementById("loginUser").value
let pass=document.getElementById("loginPass").value

let stored=localStorage.getItem(user)

if(stored==pass){

localStorage.setItem("loggedUser",user)

document.getElementById("loginPage").style.display="none"
document.getElementById("dashboard").style.display="block"

initCharts()

}else{
alert("Invalid login")
}

}

function logout(){

localStorage.removeItem("loggedUser")

document.getElementById("dashboard").style.display="none"
document.getElementById("loginPage").style.display="block"

tasks=[]
renderTasks()

}

function addTask(){

let text=document.getElementById("taskInput").value
let priority=document.getElementById("priority").value

if(text==""){
alert("Enter task")
return
}

tasks.push({
name:text,
priority:priority,
done:false,
time:0,
timer:null
})

document.getElementById("taskInput").value=""

renderTasks()

}

function renderTasks(){

let list=document.getElementById("taskList")
list.innerHTML=""

tasks.forEach((t,i)=>{

let div=document.createElement("div")
div.className="task"

div.innerHTML=`

<span class="${t.done?'completed':''}">
${t.name} (${t.priority})
</span>

<span class="timeBox">⏱ ${formatTime(t.time)}</span>

<div>
<button onclick="startTimer(${i})">Start</button>
<button onclick="stopTimer(${i})">Stop</button>
<button onclick="completeTask(${i})">✔</button>
<button onclick="deleteTask(${i})">Delete</button>
</div>
`

list.appendChild(div)

})

updateStats()
updateCharts()

}

function startTimer(i){

if(tasks[i].timer) return

tasks[i].timer=setInterval(()=>{

tasks[i].time++
renderTasks()

},1000)

}

function stopTimer(i){

clearInterval(tasks[i].timer)
tasks[i].timer=null

}

function formatTime(sec){

let m=Math.floor(sec/60)
let s=sec%60

return (m<10?"0":"")+m+":"+(s<10?"0":"")+s

}

function completeTask(i){

tasks[i].done=!tasks[i].done
renderTasks()

}

function deleteTask(i){

if(tasks[i].timer){
clearInterval(tasks[i].timer)
}

tasks.splice(i,1)
renderTasks()

}

function updateStats(){

let total=tasks.length
let done=tasks.filter(t=>t.done).length
let pending=total-done

document.getElementById("total").innerText=total
document.getElementById("done").innerText=done
document.getElementById("pending").innerText=pending

}

function initCharts(){

timeChart=new Chart(document.getElementById("timeChart"),{
type:"bar",
data:{
labels:[],
datasets:[{
label:"Study Time (minutes)",
data:[],
backgroundColor:[
"#ff6384",
"#36a2eb",
"#ffce56",
"#4bc0c0",
"#9966ff",
"#ff9f40"
]
}]
},
options:{
scales:{
y:{beginAtZero:true}
}
}
})

completionChart=new Chart(document.getElementById("completionChart"),{
type:"pie",
data:{
labels:["Completed","Pending"],
datasets:[{
data:[0,0],
backgroundColor:["#2ecc71","#e74c3c"]
}]
}
})

}

function updateCharts(){

if(!timeChart) return

let labels=tasks.map(t=>t.name)
let timeData=tasks.map(t=>(t.time/60).toFixed(2))

let completed=tasks.filter(t=>t.done).length
let pending=tasks.length-completed

timeChart.data.labels=labels
timeChart.data.datasets[0].data=timeData
timeChart.update()

completionChart.data.datasets[0].data=[completed,pending]
completionChart.update()

}

window.onload=function(){

let user=localStorage.getItem("loggedUser")

if(user){

document.getElementById("loginPage").style.display="none"
document.getElementById("dashboard").style.display="block"

initCharts()

}

}

</script>

</body>
</html>
